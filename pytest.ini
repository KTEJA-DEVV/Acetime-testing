[pytest]
pythonpath = src
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    ui: UI-only tests (tests/ui/)
    api: API-only tests (tests/api/)
    e2e: Combined UI+API end-to-end flow (tests/e2e/)